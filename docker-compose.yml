version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./agent:/agent
      - upload_data:/app/data/uploads
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/campaign_ai
      - UPLOAD_DIR=/app/data/uploads
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - PUBLISHER_DRY_RUN=${PUBLISHER_DRY_RUN:-true}
    depends_on:
      - postgres
      - redis
    command: uv run fastapi dev main.py --host 0.0.0.0 --port 8000

  agent:
    build:
      context: ./agent
    volumes:
      - ./agent:/app
    environment:
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING=true
    command: uv run python -m agent.main

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: campaign_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  upload_data:
